name: Web end-to-end tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  home-card-reorder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - run: npm run test:e2e
