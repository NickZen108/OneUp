name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/android-apk.yml'
      - 'android/**'
      - 'capacitor.config.*'
      - 'index.html'
      - 'script.js'
      - 'styles.css'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'assets/**'
      - 'manifest.webmanifest'

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.4

      - name: Install Android SDK Platform 36
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Verify debug APK exists
        run: test -f android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: OneUp-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
